<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>네이버 뉴스 댓글 자동삭제</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
      margin: 0; padding: 14px; width: 320px;
      color: #222; background: #fff;
    }
    h1 { font-size: 14px; margin: 0 0 10px; }

    /* ---------- 메인 화면 ---------- */
    .row { display: flex; gap: 6px; margin-bottom: 10px; }
    button {
      flex: 1; padding: 8px 10px; font-size: 13px;
      border: 1px solid #ccc; border-radius: 6px;
      cursor: pointer; background: #fff; font-family: inherit;
    }
    button.primary { background: #03c75a; color: #fff; border-color: #03c75a; }
    button.danger  { background: #eee;    color: #333; }
    button:disabled { opacity: 0.5; cursor: default; }

    .status {
      font-size: 12px; color: #333;
      background: #f5f5f5; border-radius: 6px; padding: 8px;
      line-height: 1.6;
    }
    .status .count { font-weight: 700; color: #03c75a; }

    .hint { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.5; }
    .warn { color: #c00; font-weight: 600; }

    .donate-link {
      margin-top: 12px; padding-top: 10px;
      border-top: 1px dashed #ddd;
      text-align: center;
    }
    .donate-link button {
      flex: none; padding: 6px 12px; font-size: 12px;
      color: #666; background: #fafafa; border: 1px solid #e5e5e5;
      border-radius: 20px; cursor: pointer;
    }
    .donate-link button:hover { background: #f0f0f0; color: #333; }

    /* ---------- 후원 화면 (참조 디자인) ---------- */
    #donate-view { display: none; }
    #donate-view.active { display: block; }
    #main-view.hidden { display: none; }

    .donate-card {
      background: #f0f0f0; border-radius: 14px; padding: 18px 14px;
      text-align: center;
    }
    .donate-emoji { font-size: 22px; }
    .donate-title {
      font-size: 15px; font-weight: 700; color: #222;
      margin: 4px 0 8px;
    }
    .donate-sub {
      font-size: 11.5px; color: #666; line-height: 1.55;
      margin: 0 0 14px;
    }
    .qr-row { display: flex; gap: 8px; }
    .qr-item {
      flex: 1; background: #fff; border-radius: 10px; padding: 10px 6px;
      text-align: center;
    }
    .qr-item img {
      width: 100%; height: auto; max-width: 130px;
      display: block; margin: 0 auto 6px;
      background: #fff;
    }
    .qr-item .brand {
      font-size: 12px; font-weight: 600; color: #222;
    }
    .qr-foot {
      font-size: 10.5px; color: #888; line-height: 1.5;
      margin: 12px 0 0;
    }
    .close-row { margin-top: 10px; }
    .close-btn {
      width: 100%; padding: 9px; font-size: 12px;
      background: #fff; color: #444;
      border: 1px solid #ddd; border-radius: 8px; cursor: pointer;
    }
    .close-btn:hover { background: #f5f5f5; }
    .qr-missing {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 120px; background: #f7f7f7;
      color: #999; font-size: 10px; text-align: center;
      border-radius: 6px; padding: 6px;
    }
  </style>
</head>
<body>

  <!-- ========== 메인 화면 ========== -->
  <div id="main-view">
    <h1>네이버 뉴스 댓글 자동삭제</h1>
    <div class="row">
      <button id="start" class="primary">시작</button>
      <button id="stop"  class="danger" disabled>중지</button>
    </div>
    <div class="status">
      상태: <span id="state">대기</span><br>
      삭제 시도: <span id="count" class="count">0</span>건
    </div>
    <div class="hint">
      ① 네이버 뉴스 기사에서 <b>내 댓글</b> 창을 여세요.<br>
      ② <b>시작</b>을 누르면 삭제 버튼을 반복 클릭합니다.<br>
      <span class="warn">주의:</span> 되돌릴 수 없습니다.
    </div>
    <div class="donate-link">
      <button id="open-donate">☕ 개발자 응원하기</button>
    </div>
  </div>

  <!-- ========== 후원 화면 ========== -->
  <div id="donate-view">
    <div class="donate-card">
      <div class="donate-emoji">☕</div>
      <div class="donate-title">개발자 응원하기</div>
      <div class="donate-sub">
        이 확장이 도움이 되셨다면<br>
        가볍게 응원 한 잔 보내주세요.
      </div>
      <div class="qr-row">
        <div class="qr-item">
          <img id="qr-kakao" src="assets/kakaopay-qr.png" alt="카카오페이 QR">
          <div class="brand">카카오페이</div>
        </div>
        <div class="qr-item">
          <img id="qr-toss" src="assets/toss-qr.jpg" alt="토스 QR">
          <div class="brand">토스</div>
        </div>
      </div>
      <div class="qr-foot">
        QR 코드를 카메라로 스캔하면 송금 화면이 열립니다.<br>
        후원은 자발적이며, 모든 기능은 무료로 사용 가능합니다.
      </div>
    </div>
    <div class="close-row">
      <button id="close-donate" class="close-btn">닫기</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
